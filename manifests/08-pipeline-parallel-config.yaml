# =============================================================================
# Custom LLMInferenceServiceConfig for pipeline parallelism
#
# RHOAI 3.4 ships only a data-parallel preset. This config provides the
# missing pipeline-parallel preset so the LLIS operator can build a
# LeaderWorkerSet where each pod holds ONE pipeline stage (fraction of layers).
#
# How it works:
#   spec.parallelism.pipeline: 3
#     → operator searches for "v3-4-0-kserve-config-llm-worker-pipeline-parallel"
#       in [bielik-demo, redhat-ods-applications] — finds this config here
#     → builds LeaderWorkerSet: 1 leader + 2 workers
#
#   Leader pod  (LWS rank 0, NODE_RANK=0):
#     vllm serve --pipeline-parallel-size=3 --nnodes=3 --node-rank=0
#     → loads layers 0..N/3, starts HTTP API server on :8000
#
#   Worker pods (LWS rank 1,2, NODE_RANK=1,2):
#     vllm serve --pipeline-parallel-size=3 --nnodes=3 --node-rank=1|2
#     → loads layers N/3..2N/3 or 2N/3..N, auto-headless (no HTTP server)
#     (vLLM sets node_rank_within_dp>0 → headless automatically)
#
#   Pipeline communication: NCCL over TCP between pod IPs on port 12345.
#
# Why pipeline, not tensor parallelism?
#   Tensor parallelism requires NVLink or fast InfiniBand (all-reduce every
#   transformer layer). g4dn.2xlarge nodes have 1× T4 connected via standard
#   AWS ENA Ethernet — pipeline parallelism passes activations between stages
#   only once per layer boundary, which is feasible over TCP.
#
# This config is namespaced to bielik-demo so it doesn't affect other RHOAI
# model servers. The operator looks in the request namespace first.
# =============================================================================
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceServiceConfig
metadata:
  name: v3-4-0-kserve-config-llm-worker-pipeline-parallel
  namespace: bielik-demo
  labels:
    app.kubernetes.io/part-of: kserve
    app.opendatahub.io/kserve: "true"
  annotations:
    serving.kserve.io/well-known-config: "true"
spec:
  template:
    containers:
    - command:
      - /bin/bash
      - -c
      - |
        # Resolve leader IP via LWS_LEADER_ADDRESS (set by LeaderWorkerSet).
        RESOLVE_ATTEMPTS=${PP_ADDRESS_RESOLVE_ATTEMPTS:-30}
        for ((i=1; i<=RESOLVE_ATTEMPTS; i++)); do
          LEADER_IP=$(getent hosts ${LWS_LEADER_ADDRESS} | cut -d' ' -f1)
          if [ -n "$LEADER_IP" ]; then
            echo "LEADER_IP=${LEADER_IP} (resolved on attempt $i)"
            break
          else
            echo "Leader IP resolution failed on attempt $i, retrying..."
            sleep 1
          fi
        done

        if [ -z "$LEADER_IP" ]; then
          echo "WARNING: Failed to resolve LEADER_IP, falling back to LWS_LEADER_ADDRESS"
          LEADER_IP=${LWS_LEADER_ADDRESS}
        fi

        # Leader is always pipeline stage 0.
        NODE_RANK=0
        echo "NODE_RANK=${NODE_RANK} (leader — will serve HTTP API on :8000)"

        eval "vllm serve \
          /mnt/models \
          --served-model-name '{{ .Spec.Model.Name }}' \
          --port 8000 \
          --pipeline-parallel-size {{ .Spec.Parallelism.Pipeline }} \
          --nnodes {{ .Spec.Parallelism.Pipeline }} \
          --node-rank ${NODE_RANK} \
          --master-addr ${LEADER_IP} \
          --master-port 12345 \
          --data-parallel-address ${LEADER_IP} \
          --data-parallel-rpc-port 5555 \
          --api-server-count ${VLLM_API_SERVER_COUNT:-1} \
          --disable-uvicorn-access-log \
          {{ if .GlobalConfig.EnableTLS }}--enable-ssl-refresh{{ end }} \
          {{ if .GlobalConfig.EnableTLS }}--ssl-certfile /var/run/kserve/tls/tls.crt{{ end }} \
          {{ if .GlobalConfig.EnableTLS }}--ssl-keyfile /var/run/kserve/tls/tls.key{{ end }} \
          ${VLLM_ADDITIONAL_ARGS} \
          $@"
      - --
      env:
      - name: HOME
        value: /home
      - name: VLLM_LOGGING_LEVEL
        value: INFO
      - name: HF_HUB_CACHE
        value: /models
      - name: NCCL_IB_DISABLE
        value: "1"
      - name: NCCL_SOCKET_IFNAME
        value: eth0
      - name: NCCL_DEBUG
        value: WARN
      image: registry.redhat.io/rhaii/vllm-cuda-rhel9@sha256:ad06abf3bb5235ebb5b2df84cd1b9fd09e823f0ff2eebfc82bb4590275ccfe0b
      imagePullPolicy: IfNotPresent
      livenessProbe:
        failureThreshold: 3
        httpGet:
          path: /health
          port: 8000
          scheme: '{{ if .GlobalConfig.EnableTLS }}HTTPS{{else}}HTTP{{- end }}'
        periodSeconds: 10
        timeoutSeconds: 10
      name: main
      ports:
      - containerPort: 8000
        protocol: TCP
      - containerPort: 12345
        protocol: TCP
        name: pp-rendezvous
      - containerPort: 5555
        protocol: TCP
        name: dp-rpc
      readinessProbe:
        failureThreshold: 60
        httpGet:
          path: /health
          port: 8000
          scheme: '{{ if .GlobalConfig.EnableTLS }}HTTPS{{else}}HTTP{{- end }}'
        periodSeconds: 30
        timeoutSeconds: 5
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          add:
          - IPC_LOCK
          - SYS_RAWIO
          - NET_RAW
          drop:
          - ALL
        readOnlyRootFilesystem: false
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      startupProbe:
        failureThreshold: 60
        httpGet:
          path: /health
          port: 8000
          scheme: '{{ if .GlobalConfig.EnableTLS }}HTTPS{{else}}HTTP{{- end }}'
        periodSeconds: 10
      terminationMessagePath: /dev/termination-log
      terminationMessagePolicy: FallbackToLogsOnError
      volumeMounts:
      - mountPath: /home
        name: home
      - mountPath: /dev/shm
        name: dshm
      - mountPath: /models
        name: model-cache
      - mountPath: /var/run/kserve/tls
        name: tls-certs
        readOnly: true
    terminationGracePeriodSeconds: 30
    volumes:
    - emptyDir: {}
      name: home
    - emptyDir:
        medium: Memory
        sizeLimit: 8Gi
      name: dshm
    - emptyDir: {}
      name: model-cache
    - name: tls-certs
      secret:
        secretName: '{{ ChildName .ObjectMeta.Name `-kserve-self-signed-certs` }}'
  worker:
    containers:
    - command:
      - /bin/bash
      - -c
      - |
        # Resolve leader IP via LWS_LEADER_ADDRESS (set by LeaderWorkerSet).
        RESOLVE_ATTEMPTS=${PP_ADDRESS_RESOLVE_ATTEMPTS:-30}
        for ((i=1; i<=RESOLVE_ATTEMPTS; i++)); do
          LEADER_IP=$(getent hosts ${LWS_LEADER_ADDRESS} | cut -d' ' -f1)
          if [ -n "$LEADER_IP" ]; then
            echo "LEADER_IP=${LEADER_IP} (resolved on attempt $i)"
            break
          else
            echo "Leader IP resolution failed on attempt $i, retrying..."
            sleep 1
          fi
        done

        if [ -z "$LEADER_IP" ]; then
          echo "WARNING: Failed to resolve LEADER_IP, falling back to LWS_LEADER_ADDRESS"
          LEADER_IP=${LWS_LEADER_ADDRESS}
        fi

        # Worker rank = LWS_WORKER_INDEX (1-indexed within the LWS group).
        # vLLM automatically sets this node to headless (no HTTP API server)
        # when node_rank_within_dp > 0 (which is true for all workers in pure PP).
        NODE_RANK=${LWS_WORKER_INDEX:-1}
        echo "NODE_RANK=${NODE_RANK} (worker — pipeline stage ${NODE_RANK}, headless)"

        eval "vllm serve \
          /mnt/models \
          --pipeline-parallel-size {{ .Spec.Parallelism.Pipeline }} \
          --nnodes {{ .Spec.Parallelism.Pipeline }} \
          --node-rank ${NODE_RANK} \
          --master-addr ${LEADER_IP} \
          --master-port 12345 \
          --data-parallel-address ${LEADER_IP} \
          --data-parallel-rpc-port 5555 \
          --disable-uvicorn-access-log \
          {{ if .GlobalConfig.EnableTLS }}--enable-ssl-refresh{{ end }} \
          {{ if .GlobalConfig.EnableTLS }}--ssl-certfile /var/run/kserve/tls/tls.crt{{ end }} \
          {{ if .GlobalConfig.EnableTLS }}--ssl-keyfile /var/run/kserve/tls/tls.key{{ end }} \
          ${VLLM_ADDITIONAL_ARGS} \
          $@"
      - --
      env:
      - name: HOME
        value: /home
      - name: VLLM_LOGGING_LEVEL
        value: INFO
      - name: HF_HUB_CACHE
        value: /models
      - name: NCCL_IB_DISABLE
        value: "1"
      - name: NCCL_SOCKET_IFNAME
        value: eth0
      - name: NCCL_DEBUG
        value: WARN
      image: registry.redhat.io/rhaii/vllm-cuda-rhel9@sha256:ad06abf3bb5235ebb5b2df84cd1b9fd09e823f0ff2eebfc82bb4590275ccfe0b
      imagePullPolicy: IfNotPresent
      name: main
      ports:
      - containerPort: 12345
        protocol: TCP
        name: pp-rendezvous
      - containerPort: 5555
        protocol: TCP
        name: dp-rpc
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          add:
          - IPC_LOCK
          - SYS_RAWIO
          - NET_RAW
          drop:
          - ALL
        readOnlyRootFilesystem: false
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      terminationMessagePath: /dev/termination-log
      terminationMessagePolicy: FallbackToLogsOnError
      volumeMounts:
      - mountPath: /home
        name: home
      - mountPath: /dev/shm
        name: dshm
      - mountPath: /models
        name: model-cache
      - mountPath: /var/run/kserve/tls
        name: tls-certs
        readOnly: true
    terminationGracePeriodSeconds: 30
    volumes:
    - emptyDir: {}
      name: home
    - emptyDir:
        medium: Memory
        sizeLimit: 8Gi
      name: dshm
    - emptyDir: {}
      name: model-cache
    - name: tls-certs
      secret:
        secretName: '{{ ChildName .ObjectMeta.Name `-kserve-self-signed-certs` }}'
