# Llama Stack Playground for Bielik-11B (RHOAI Gen AI studio)
#
# Deploys a llama-stack server that connects to the bielik-11b LLMInferenceService
# and exposes it in RHOAI's Gen AI studio → Playground UI.
#
# KEY CONFIGURATION NOTE:
#   VLLM_MAX_TOKENS (1024) must be < max-model-len (4096) to leave room for input tokens.
#   Setting VLLM_MAX_TOKENS=4096 (the total context window) causes all inference to fail
#   with 400 "0 input tokens available" errors.
#
# Apply: oc apply -f manifests/09-playground.yaml
# The llama-stack-operator reconciles the Deployment — no pod restart of the LLIS needed.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-stack-config
  namespace: bielik-demo
  labels:
    llamastack.io/distribution: lsd-genai-playground
    opendatahub.io/dashboard: "true"
data:
  config.yaml: |
    # Llama Stack Configuration
    version: "2"
    distro_name: rh
    apis:
    - responses
    - datasetio
    - files
    - inference
    - safety
    - scoring
    - tool_runtime
    - vector_io
    providers:
      inference:
      - provider_id: sentence-transformers
        provider_type: inline::sentence-transformers
        config: {}
      - provider_id: vllm-inference-1
        provider_type: remote::vllm
        config:
          api_token: ${env.VLLM_API_TOKEN_1:=fake}
          base_url: https://bielik-11b-kserve-workload-svc.bielik-demo.svc.cluster.local:8000/v1
          max_tokens: ${env.VLLM_MAX_TOKENS:=1024}
          tls_verify: ${env.VLLM_TLS_VERIFY:=true}
      vector_io:
      - provider_id: milvus
        provider_type: inline::milvus
        config:
          db_path: /opt/app-root/src/.llama/distributions/rh/milvus.db
          persistence:
            backend: kv_default
            namespace: vector_io::milvus
      responses:
      - provider_id: builtin
        provider_type: inline::builtin
        config:
          persistence:
            agent_state:
              backend: kv_default
              namespace: agents
            responses:
              backend: sql_default
              max_write_queue_size: 10000
              num_writers: 4
              table_name: responses
      eval: []
      files:
      - provider_id: meta-reference-files
        provider_type: inline::localfs
        config:
          metadata_store:
            backend: sql_default
            table_name: files_metadata
          storage_dir: /opt/app-root/src/.llama/distributions/rh/files
      datasetio:
      - provider_id: huggingface
        provider_type: remote::huggingface
        config:
          kvstore:
            backend: kv_default
            namespace: datasetio::huggingface
      scoring:
      - provider_id: basic
        provider_type: inline::basic
        config: {}
      - provider_id: llm-as-judge
        provider_type: inline::llm-as-judge
        config: {}
      tool_runtime:
      - provider_id: file-search
        provider_type: inline::file-search
        config: {}
      - provider_id: model-context-protocol
        provider_type: remote::model-context-protocol
        config: {}
      safety: []
    metadata_store:
      type: sqlite
      db_path: /opt/app-root/src/.llama/distributions/rh/inference_store.db
    storage:
      backends:
        kv_default:
          db_path: /opt/app-root/src/.llama/distributions/rh/kvstore.db
          type: kv_sqlite
        sql_default:
          db_path: /opt/app-root/src/.llama/distributions/rh/sql_store.db
          type: sql_sqlite
      stores:
        conversations:
          backend: sql_default
          table_name: openai_conversations
        inference:
          backend: sql_default
          table_name: inference_store
        metadata:
          backend: kv_default
          namespace: registry
    vector_stores:
      default_provider_id: milvus
      default_embedding_model:
        provider_id: sentence-transformers
        model_id: ibm-granite/granite-embedding-125m-english
    registered_resources:
      models:
      - provider_id: sentence-transformers
        model_id: sentence-transformers/ibm-granite/granite-embedding-125m-english
        provider_model_id: ibm-granite/granite-embedding-125m-english
        model_type: embedding
        metadata:
          embedding_dimension: 768
      - provider_id: vllm-inference-1
        model_id: bielik-11b
        model_type: llm
        metadata:
          description: Polski model językowy SpeakLeash, 11B parametrów — inference na
            3 węzłach GPU via llm-d data parallelism (RHOAI 3.4 built-in)
          display_name: Bielik-11B-v2.3-Instruct (data-parallel, 3× T4)
      shields: []
      vector_stores: []
      datasets: []
      scoring_fns: []
      benchmarks: []
    server:
      port: 8321
---
apiVersion: llamastack.io/v1alpha1
kind: LlamaStackDistribution
metadata:
  name: lsd-genai-playground
  namespace: bielik-demo
  annotations:
    openshift.io/display-name: lsd-genai-playground
  labels:
    opendatahub.io/dashboard: "true"
spec:
  network:
    allowedFrom:
      namespaces:
      - bielik-demo
    exposeRoute: false
  replicas: 1
  server:
    containerSpec:
      command:
      - /bin/sh
      - -c
      - llama stack run /etc/llama-stack/config.yaml
      env:
      - name: VLLM_TLS_VERIFY
        value: "false"
      - name: MILVUS_DB_PATH
        value: ~/.llama/milvus.db
      - name: FMS_ORCHESTRATOR_URL
        value: http://localhost
      - name: VLLM_MAX_TOKENS
        value: "1024"
      - name: VLLM_API_TOKEN_1
        value: fake
      - name: LLAMA_STACK_CONFIG_DIR
        value: /opt/app-root/src/.llama/distributions/rh/
      name: llama-stack
      port: 8321
      resources:
        limits:
          cpu: "2"
          memory: 8Gi
        requests:
          cpu: 250m
          memory: 500Mi
    distribution:
      name: rh-dev
    userConfig:
      configMapName: llama-stack-config
