apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: bielik-11b-multinode
  namespace: bielik-demo
  labels:
    opendatahub.io/dashboard: "true"
    opendatahub.io/genai-asset: "true"
  annotations:
    opendatahub.io/hardware-profile-name: gpu-profile
    opendatahub.io/hardware-profile-namespace: redhat-ods-applications
    opendatahub.io/model-type: generative
    security.opendatahub.io/enable-auth: "false"
    openshift.io/display-name: "Bielik-11B-v2.3-Instruct (GPTQ)"
    openshift.io/description: "Polski model językowy SpeakLeash, 11B parametrów, GPTQ 4-bit, single GPU T4"
spec:
  replicas: 1
  model:
    uri: "hf://speakleash/Bielik-11B-v2.3-Instruct-GPTQ"
    name: "bielik-11b"
  router:
    gateway:
      refs:
        - name: maas-default-gateway
          namespace: openshift-ingress
    route: {}
    scheduler: {}
  template:
    volumes:
      - name: kserve-provision-location
        persistentVolumeClaim:
          claimName: bielik-model-cache
    containers:
      - name: main
        args:
          - "--quantization=gptq"
          - "--dtype=float16"
          - "--max-model-len=4096"
          - "--gpu-memory-utilization=0.85"
          - "--trust-remote-code"
          - "--enforce-eager"
        env:
          - name: HF_HOME
            value: "/tmp/hf_home"
        envFrom:
          - secretRef:
              name: huggingface-token
        resources:
          requests:
            cpu: "1"
            memory: "12Gi"
            nvidia.com/gpu: "1"
          limits:
            cpu: "8"
            memory: "24Gi"
            nvidia.com/gpu: "1"
