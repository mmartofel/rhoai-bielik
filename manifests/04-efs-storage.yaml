---
# EFS StorageClass — używa aws-efs-csi-driver (zainstalowanego przez Helm)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: efs-sc
provisioner: efs.csi.aws.com
reclaimPolicy: Retain
volumeBindingMode: Immediate
---
# PV statyczny — EFS fs-05a0875a153ce7b19 z Access Point fsap-0e62e6b28b6d4beb9
# Access Point: root=/bielik-models, UID/GID=1000950000 (OpenShift SCC default)
# Wymaga: EFS file system i access point już istniejącego (tworzone przez scripts/setup-efs.sh)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: bielik-model-efs-pv
spec:
  capacity:
    storage: 50Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: efs-sc
  csi:
    driver: efs.csi.aws.com
    volumeHandle: "fs-05a0875a153ce7b19::fsap-0e62e6b28b6d4beb9"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bielik-model-cache
  namespace: bielik-demo
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: efs-sc
  volumeName: bielik-model-efs-pv
  resources:
    requests:
      storage: 50Gi
